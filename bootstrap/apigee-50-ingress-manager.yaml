apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apigee-50-ingress-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  project: default
  source:
    repoURL: https://github.com/MathewLove17/apigeehybrid.git
    targetRevision: main
    path: charts/apigee-ingress-manager
    helm:
      valueFiles:
        - ../../overrides/overrides_V15_test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apigee
  syncPolicy:
    # automated:
    #   prune: false
    #   selfHeal: true
    syncOptions:
      - CreateNamespace=false