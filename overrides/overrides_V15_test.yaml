udca:
  serviceAccountRef: apigee-udca-svc-account #Secret Ref with the Service Account
 
 
 
watcher:
  serviceAccountRef: apigee-watcher-svc-account
  # For example: "apigee-watcher-svc-account"
  # replicaCountMin: 1 # Default value: 1
  # replicaCountMax: 1 # Default value: 1
  # ¡Warning!: Do not exceed a value of 1 for watcher.replicaCountMax.
  resources:
    requests:
      cpu: 500m # Default value: ¿?
      memory: 2Gi # Default value: ¿?
    limits:
      cpu: 2 # Default value: 1000m
      memory: 8Gi # Default value: 2Gi
 
 
