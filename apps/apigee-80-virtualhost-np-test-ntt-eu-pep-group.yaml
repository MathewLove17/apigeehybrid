apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apigee-80-virtualhost-np-test-ntt-eu-pep-group
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '80'
spec:
  project: default
  source:
    repoURL: https://github.com/MathewLove17/apigeehybrid.git
    targetRevision: main
    path: charts/apigee-virtualhost
    helm:
      valueFiles:
      - ../../overrides/overrides_np-test-ntt_v1.15.1.yaml
      parameters:
      - name: envgroup
        value: eu-pep-group
  destination:
    server: https://kubernetes.default.svc
    namespace: apigee
  syncPolicy:
    syncOptions:
    - CreateNamespace=false
    - ServerSideApply=true
    automated:
      prune: false
      selfHeal: true
