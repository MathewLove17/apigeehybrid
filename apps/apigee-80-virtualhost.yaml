apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apigee-80-virtualhost
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "80"
spec:
  project: default
  source:
    repoURL: https://github.com/MathewLove17/apigeehybrid.git
    targetRevision: main
    path: charts/apigee-virtualhost
    helm:
      valueFiles:
        - ../../overrides/overrides_V15_test.yaml
      parameters:
        - name: envgroup
          value: eu-dev-group
  destination:
    server: https://kubernetes.default.svc
    namespace: apigee
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false