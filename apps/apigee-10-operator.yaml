apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apigee-10-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/MathewLove17/apigeehybrid.git
    targetRevision: main
    path: charts/apigee-operator
    helm:
      valueFiles:
        - ../overrides/overrides_V15_test.yaml
  destination:
    name: https://kubernetes.default.svc
    namespace: apigee
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false