apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apigee-70-env
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "60"
spec:
  project: default
  source:
    repoURL: https://github.com/MathewLove17/apigeehybrid.git
    targetRevision: main
    path: charts/apigee-env
    helm:
      valueFiles:
        - ../../overrides/overrides_V15_test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apigee
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false